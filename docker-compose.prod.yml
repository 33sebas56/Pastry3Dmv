services:
  postgres:
    image: postgres:16
    container_name: pastry3d_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pastry3d}
      POSTGRES_USER: ${POSTGRES_USER:-pastry3d}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pastry3d}
    volumes:
      - pastry3d_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pastry3d} -d ${POSTGRES_DB:-pastry3d}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - pastry3d_network

  backend:
    build:
      context: ./back_pastry3d
      dockerfile: Dockerfile
    container_name: pastry3d_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 8080

      DB_URL: ${DB_URL:-jdbc:postgresql://postgres:5432/pastry3d}
      DB_USERNAME: ${DB_USERNAME:-pastry3d}
      DB_PASSWORD: ${DB_PASSWORD:-pastry3d}

      JWT_SECRET: ${JWT_SECRET:-change-me-super-secret-jwt-key-minimum-64-characters}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}

      APP_ADMIN_SEED_ENABLED: ${APP_ADMIN_SEED_ENABLED:-true}
      APP_ADMIN_EMAIL: ${APP_ADMIN_EMAIL:-admin@pastry3d.local}
      APP_ADMIN_PASSWORD: ${APP_ADMIN_PASSWORD:-Admin12345}

      APP_MAIL_ENABLED: ${APP_MAIL_ENABLED:-false}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-no-reply@pastry3d.local}
      APP_MAIL_REGISTER_CODE_EXPIRATION_MINUTES: ${APP_MAIL_REGISTER_CODE_EXPIRATION_MINUTES:-30}

      GEMINI_ENABLED: ${GEMINI_ENABLED:-false}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-1.5-flash}

      FAIRSTACK_ENABLED: ${FAIRSTACK_ENABLED:-false}
      FAIRSTACK_BASE_URL: ${FAIRSTACK_BASE_URL:-}
      FAIRSTACK_API_KEY: ${FAIRSTACK_API_KEY:-}
      FAIRSTACK_GENERATE_PATH: ${FAIRSTACK_GENERATE_PATH:-/generations/threeD}
      FAIRSTACK_JOB_STATUS_PATH: ${FAIRSTACK_JOB_STATUS_PATH:-/jobs/{jobId}}
      FAIRSTACK_MODEL: ${FAIRSTACK_MODEL:-hunyuan-3d-rapid-t23d}
      FAIRSTACK_TIMEOUT_SECONDS: ${FAIRSTACK_TIMEOUT_SECONDS:-180}
      FAIRSTACK_CONFIRM: ${FAIRSTACK_CONFIRM:-false}
      FAIRSTACK_MAX_COST_USD: ${FAIRSTACK_MAX_COST_USD:-3.00}

      TRIPO_ENABLED: ${TRIPO_ENABLED:-false}
      TRIPO_BASE_URL: ${TRIPO_BASE_URL:-https://api.tripo3d.ai/v2/openapi}
      TRIPO_API_KEY: ${TRIPO_API_KEY:-}
      TRIPO_MODEL_VERSION: ${TRIPO_MODEL_VERSION:-v3.1-20260211}
      TRIPO_TEXTURE: ${TRIPO_TEXTURE:-true}
      TRIPO_PBR: ${TRIPO_PBR:-true}
      TRIPO_TEXTURE_QUALITY: ${TRIPO_TEXTURE_QUALITY:-standard}
      TRIPO_GEOMETRY_QUALITY: ${TRIPO_GEOMETRY_QUALITY:-standard}
      TRIPO_FACE_LIMIT: ${TRIPO_FACE_LIMIT:-30000}
      TRIPO_AUTO_SIZE: ${TRIPO_AUTO_SIZE:-true}
      TRIPO_EXPORT_UV: ${TRIPO_EXPORT_UV:-true}
      TRIPO_SMART_LOW_POLY: ${TRIPO_SMART_LOW_POLY:-false}
      TRIPO_QUAD: ${TRIPO_QUAD:-false}
      TRIPO_NEGATIVE_PROMPT: ${TRIPO_NEGATIVE_PROMPT:-low quality, blurry, deformed, broken geometry, extra objects, plate, table, hands, people, text, logo, watermark}
      TRIPO_TIMEOUT_SECONDS: ${TRIPO_TIMEOUT_SECONDS:-180}

      STORAGE_UPLOADS: ${STORAGE_UPLOADS:-/opt/pastry3d/uploads/models}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-https://pastry3d-sebas.duckdns.org,http://pastry3d-sebas.duckdns.org}
      APP_PUBLIC_BASE_URL: ${APP_PUBLIC_BASE_URL:-https://pastry3d-sebas.duckdns.org}

      JPA_SHOW_SQL: ${JPA_SHOW_SQL:-false}
    volumes:
      - ./back_pastry3d/uploads/models:/opt/pastry3d/uploads/models
    expose:
      - "8080"
    networks:
      - pastry3d_network

  frontend:
    build:
      context: ./front_pastry3d
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    container_name: pastry3d_frontend
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"
    networks:
      - pastry3d_network

  caddy:
    image: caddy:2.8-alpine
    container_name: pastry3d_caddy
    restart: unless-stopped
    depends_on:
      - frontend
    environment:
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN:-pastry3d-sebas.duckdns.org}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - pastry3d_caddy_data:/data
      - pastry3d_caddy_config:/config
    networks:
      - pastry3d_network

volumes:
  pastry3d_postgres_data:
  pastry3d_caddy_data:
  pastry3d_caddy_config:

networks:
  pastry3d_network:
    driver: bridge