services:
  postgres:
    image: postgres:16
    container_name: pastry3d_postgres
    environment:
      POSTGRES_DB: pastry3d
      POSTGRES_USER: pastry3d
      POSTGRES_PASSWORD: pastry3d
    ports:
      - "5432:5432"
    volumes:
      - pastry3d_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pastry3d -d pastry3d"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pastry3d_postgres_data:
