server.address=0.0.0.0
server.port=${PORT:8080}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/pastry3d}
spring.datasource.username=${DB_USERNAME:pastry3d}
spring.datasource.password=${DB_PASSWORD:pastry3d}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

jwt.secret=${JWT_SECRET:pastry3d-development-secret-key-change-me-2026-very-long-secret-64}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# CORS front local o dominio de DuckDNS/VM cuando exista
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:5173,http://localhost:3000}
app.public-base-url=${APP_PUBLIC_BASE_URL:http://localhost:8080}
app.frontend-base-url=${APP_FRONTEND_BASE_URL:http://localhost:5173}

# Admin inicial para demo. Cambiar en VM.
app.admin.seed-enabled=${APP_ADMIN_SEED_ENABLED:true}
app.admin.email=${APP_ADMIN_EMAIL:admin@pastry3d.local}
app.admin.password=${APP_ADMIN_PASSWORD:Admin12345}

# SMTP opcional. Para demo independiente puede quedar false.
app.mail.enabled=${APP_MAIL_ENABLED:false}
app.mail.from=${MAIL_FROM:no-reply@pastry3d.local}
app.mail.register-code-expiration-minutes=${APP_MAIL_REGISTER_CODE_EXPIRATION_MINUTES:30}
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# Storage local para GLB. En VM usar /opt/pastry3d/uploads/models
storage.mode=local
storage.uploads=${STORAGE_UPLOADS:uploads/models}
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=120MB

# Gemini. Si queda false o sin API key, usa fallback heurístico para demo.
gemini.enabled=${GEMINI_ENABLED:false}
gemini.api-key=${GEMINI_API_KEY:}
gemini.model=${GEMINI_MODEL:gemini-1.5-flash}

# FairStack. Para primera demo se recomienda false.
fairstack.enabled=${FAIRSTACK_ENABLED:false}
fairstack.base-url=${FAIRSTACK_BASE_URL:}
fairstack.api-key=${FAIRSTACK_API_KEY:}
fairstack.generate-path=${FAIRSTACK_GENERATE_PATH:/generate}
fairstack.job-status-path=${FAIRSTACK_JOB_STATUS_PATH:/jobs/{jobId}}
fairstack.timeout-seconds=${FAIRSTACK_TIMEOUT_SECONDS:120}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized

# Tripo. Generación externa 3D para modelos faltantes.
tripo.enabled=${TRIPO_ENABLED:false}
tripo.base-url=${TRIPO_BASE_URL:https://api.tripo3d.ai/v2/openapi}
tripo.api-key=${TRIPO_API_KEY:}
tripo.model-version=${TRIPO_MODEL_VERSION:v3.1-20260211}
tripo.texture=${TRIPO_TEXTURE:true}
tripo.pbr=${TRIPO_PBR:true}
tripo.texture-quality=${TRIPO_TEXTURE_QUALITY:standard}
tripo.geometry-quality=${TRIPO_GEOMETRY_QUALITY:standard}
tripo.face-limit=${TRIPO_FACE_LIMIT:30000}
tripo.auto-size=${TRIPO_AUTO_SIZE:true}
tripo.export-uv=${TRIPO_EXPORT_UV:true}
tripo.smart-low-poly=${TRIPO_SMART_LOW_POLY:false}
tripo.quad=${TRIPO_QUAD:false}
tripo.negative-prompt=${TRIPO_NEGATIVE_PROMPT:low quality, blurry, deformed, broken geometry, extra objects, plate, table, hands, people, text, logo, watermark}
tripo.timeout-seconds=${TRIPO_TIMEOUT_SECONDS:180}
